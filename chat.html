<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">

<title>NEXA Messenger</title>

<link rel="stylesheet" href="style.css">
<link rel="stylesheet" href="chat.css">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

</head>

<body>

<div class="chat-container">

    <!-- LEFT SIDE -->

    <div class="chat-list">

        <div class="chat-header">

            <h2>Chats</h2>

            <button id="newChat">

                <i class="fas fa-user-plus"></i>

            </button>

        </div>

        <input
            type="text"
            id="searchChat"
            placeholder="Search people...">

        <div id="conversationList">

        </div>
<div id="userSearchPanel" class="user-search-panel" style="display:none;">

    <h3>Start New Chat</h3>

    <input
        type="text"
        id="findUser"
        placeholder="Search users...">

    <div id="allUsers"></div>

</div>
    </div>

    <!-- RIGHT SIDE -->

    <div class="chat-room">

        <div class="room-header">

            <div class="user-info">

                <img
                    id="chatPhoto"
                    src="avatar.png">

                <div>

                    <h3 id="chatName">

                        Select a chat

                    </h3>

                    <small id="chatStatus">

                        Offline

                    </small>

                </div>

            </div>

            <div class="room-icons">

                <i class="fas fa-phone"></i>

                <i class="fas fa-video"></i>

                <i class="fas fa-ellipsis-v"
                   id="chatMenuBtn"></i>

            </div>

        </div>

        <div id="messages">

        </div>

        <div class="message-box">

            <button id="emojiBtn">😊</button>

            <button id="attachBtn">

                📎

            </button>

            <input
                type="text"
                id="messageInput"
                placeholder="Type a message...">

            <button id="sendMessage">

                ➤

            </button>

        </div>

    </div>

</div>

<div id="chatMenu" class="chat-menu">

<button>🎨 Change Theme</button>

<button>🖼 Change Wallpaper</button>

<button>🔍 Search Messages</button>

<button>📌 Pin Chat</button>

<button>🔕 Mute Chat</button>

<button>🧹 Clear Chat</button>

<button>🚫 Block User</button>

<button>🚩 Report User</button>

<button>ℹ Chat Info</button>

</div>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>

<script src="firebase.js"></script>

<script src="chat.js"></script>
<script src="chat-menu.js"></script>

</body>
</html>
