<head>

href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

</head>

<body>

<header class="topbar">

<button class="menu-btn" onclick="openMenu()">☰</button>

<div class="logo">

<img src="NEXA.png" alt="Logo">

<h2>NEXA Chats</h2>

</div>

<div class="top-icons">

<a href="notifications.html"><i class="fas fa-bell"></i></a>

<a href="profile.html"><i class="fas fa-user-circle"></i></a>

</div>

<div id="sideMenu" class="side-menu">

<a href="index.html">🏠 Home</a>

<section class="container">

<h1>Chats</h1>

<p>Select a conversation below.</p>

<div id="chatList">

<div class="user-card">

<p>Welcome to NEXA Messenger.</p>

<button onclick="openChat('NEXA Support')">

Open Chat

</button>

</div>

<div id="messages" class="chat-box">

<p>Select a conversation to begin.</p>

</div>

<div class="chat-input">

<input
type="text"
id="chatInput"
placeholder="Type your message...">

<button onclick="sendMessage()">

Send

</button>

</div>

</section>

<footer>

</footer>
