<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta
name="viewport"

<title>NEXA Messenger</title>

<div class="chat-container">

    <div class="chat-list">

            <button id="newChat">

                <i class="fas fa-user-plus"></i>

            </button>

        </div>

        <input

        <div id="conversationList">

        </div>
<div id="userSearchPanel" class="user-search-panel" style="display:none;">

    <h3>Start New Chat</h3>

    <input
        type="text"
        id="findUser"
        placeholder="Search users...">

    <div id="allUsers"></div>

</div>
    </div>

    <!-- RIGHT SIDE -->

    <div class="chat-room">

        <div class="room-header">

           <button id="backBtn" class="back-btn">
    <i class="fas fa-arrow-left"></i>

                    src="avatar.png">

<div id="imagePreview" class="image-preview">

    <img id="previewImage">

    <textarea

    <div class="preview-buttons">

        <button id="cancelImage">
            Cancel
        </button>

        <button id="sendImage">
            Send

    </div>

</div>

                </div>

            </div>

            <div class="room-icons">

                <i class="fas fa-phone"></i>

                <i class="fas fa-video"></i>

                <i class="fas fa-ellipsis-v"
                   id="chatMenuBtn"></i>

            </div>


        </div>

        <div class="messages"></div>
<div class="their-message">

    <div class="message-text">
        Hello 👋

</div>

        <span class="status sent">
            ✓
        </span>

    </div>

</div>
<div id="emojiPanel" class="emoji-panel">

    <span>😀</span>

    <span>👍</span>
    <span>🔥</span>
    <span>🎉</span>

</div>
<div id="recordingBar" class="recording-bar">

    <i class="fas fa-microphone"></i>

    <span id="recordTime">
        00:00
    </span>

    <button id="cancelRecord">
        Cancel
    </button>

</div>
<div class="message-box">

    <button id="emojiBtn">😊</button>

    <button id="attachBtn">📎</button>

    <input
        type="text"
        id="messageInput"
        placeholder="Type a message...">

    <div class="chat-actions">

    <button id="recordBtn">
        <i class="fas fa-microphone"></i>
    </button>

    <button id="sendMessage">
        <i class="fas fa-paper-plane"></i>
    </button>
