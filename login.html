<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Login | NEXA</title>

<link rel="stylesheet" href="menu.css">
<link rel="stylesheet" href="style.css">
<link rel="stylesheet" href="auth.css">
<meta name="theme-color" content="#d63384">
</head>

<body>
<div class="auth-container">

    <div class="logo-area">
        <img src="NEXA.png" class="logo">
        <h1>NEXA</h1>
        <p>Digital Services</p>
    </div>

    <h2>Welcome Back 👋</h2>

    <input type="email" id="loginEmail" placeholder="Email Address">

    <div class="password-box">
    <input type="password" id="login Password" placeholder="Password">
    <span class="toggle-password" onclick="toggleloginPassword()">👁</span>
</div>

<div class="password-box">
    <input type="password" id="confirmPassword" placeholder="Confirm Password">
    <span class="toggle-password" onclick="toggleConfirmPassword()">👁</span>
</div>

    <button onclick="handlelogin()">Login</button>

    <a class="forgot-link" href="#">Forgot Password?</a>

    <p class="bottom-text">
        Don't have an account?
        <a href="signup.html">Create One</a>
    </p>

</div>

<script>
function handleLogin() {

    const email = document.getElementById("loginEmail").value;
    const password = document.getElementById("loginPassword").value;

    login(email, password);
}
function toggleLoginPassword() {

    const input = document.getElementById("loginPassword");

    input.type = input.type === "password" ? "text" : "password";

}
</script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>

<script src="firebase.js"></script>
<script src="auth.js"></script>

</body>
</html>
