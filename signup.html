<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Sign Up | NEXA</title>

<link rel="stylesheet" href="style.css">
<link rel="stylesheet" href="menu.css">
<link rel="stylesheet" href="auth.css">
<meta name="theme-color" content="#d63384">
</head>

<body>

<div class="auth-container">

    <div class="logo-area">
        <img src="NEXA.png" class="logo">
        <h1>NEXA</h1>
        <p>Digital Services</p>
    </div>

    <h2>Create Your Account</h2>

    <input type="email" id="SignupEmail" placeholder="Email Address">

    <div class="password-box">
    <input type="password" id="signupPassword" placeholder="Password">
    <span class="toggle-password" onclick="toggleSignupPassword()">👁</span>
</div>

<div class="password-box">
    <input type="password" id="confirmPassword" placeholder="Confirm Password">
    <span class="toggle-password" onclick="toggleConfirmPassword()">👁</span>
</div>

    <button onclick="handleSignup()">Signup</button>

    <p class="bottom-text">
        Already Have An Account?
        <a href="Login.html">Login</a>
    </p>

</div>

<script>
function handleSignup() {

    const name = document.getElementById("signupName").value.trim();
    const email = document.getElementById("signupEmail").value.trim();
    const password = document.getElementById("signupPassword").value;
    const confirmPassword = document.getElementById("confirmPassword").value;

    if (name === "") {
        alert("Please enter your full name.");
        return;
    }

    if (email === "") {
        alert("Please enter your email.");
        return;
    }

    if (password.length < 6) {
        alert("Password must be at least 6 characters.");
        return;
    }

    if (password !== confirmPassword) {
        alert("Passwords do not match.");
        return;
    }

    signUp(name, email, password);
}
function toggleSignupPassword() {

    const input = document.getElementById("signupPassword");

    input.type = input.type === "password" ? "text" : "password";

}

function toggleConfirmPassword() {

    const input = document.getElementById("confirmPassword");

    input.type = input.type === "password" ? "text" : "password";

}
db.ref("notifications/" + user.uid).push({
    title: "Welcome to NEXA",
    message: "Your account has been created successfully. Enjoy using NEXA!",
    time: Date.now(),
    read: false
});
</script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>

<script src="firebase.js"></script>
<script src="auth.js"></script>
</body>
</html>
